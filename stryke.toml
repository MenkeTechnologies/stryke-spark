[package]
name = "stryke-spark"
version = "0.18.0"
description = "Apache Spark client for stryke. cdylib loaded in-process — spawns spark-submit with an embedded PySpark driver per call. Persistent SparkSession deferred (needs long-running JVM daemon design)."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-spark"
edition = "2026"

[ffi]
lib-name = "stryke_spark"
namespace = "Spark"
exports = [
    "spark__pkg_version",
    "spark__ping",
    "spark__query",
    "spark__execute",
    "spark__dump",
    "spark__tables",
    "spark__databases",
    "spark__views",
    "spark__catalogs",
    "spark__current_database",
    "spark__create_temp_view",
    "spark__drop_temp_view",
    "spark__set_database",
    "spark__refresh_table",
    "spark__schema",
    "spark__submit",
    "spark__explain",
    "spark__read",
    "spark__write",
    "spark__columns",
    "spark__functions",
    "spark__cache",
    "spark__uncache",
    "spark__config",
    "spark__parse_master_url",
    "spark__build_master_url",
    "spark__parse_table_name",
    "spark__build_table_name",
    "spark__parse_memory",
    "spark__build_memory",
    "spark__convert_memory",
    "spark__quote_ident",
    "spark__unquote_ident",
    "spark__unquote_literal",
    "spark__parse_partition_spec",
    "spark__quote_qualified_ident",
    "spark__parse_qualified_ident",
    "spark__quote_ident_if_needed",
    "spark__escape_like",
    "spark__unescape_like",
    "spark__parse_jdbc_url",
    "spark__build_jdbc_url",
    "spark__parse_conf",
    "spark__build_conf",
    "spark__merge_confs",
    "spark__parse_partition_path",
    "spark__build_partition_path",
    "spark__parse_data_type",
    "spark__parse_app_id",
    "spark__split_sql_statements",
    "spark__parse_duration",
    "spark__build_duration",
    "spark__parse_storage_level",
    "spark__build_storage_level",
    "spark__parse_maven_coordinate",
    "spark__split_packages",
    "spark__build_data_type",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
