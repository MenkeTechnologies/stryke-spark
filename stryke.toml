[package]
name = "stryke-spark"
version = "0.2.1"
description = "Apache Spark client for stryke. cdylib loaded in-process — spawns spark-submit with an embedded PySpark driver per call. Persistent SparkSession deferred (needs long-running JVM daemon design)."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-spark"
edition = "2026"

[ffi]
lib-name = "stryke_spark"
namespace = "Spark"
exports = [
    "spark__pkg_version",
    "spark__ping",
    "spark__query",
    "spark__execute",
    "spark__dump",
    "spark__tables",
    "spark__databases",
    "spark__schema",
    "spark__submit",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
